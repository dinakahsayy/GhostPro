{% extends "base.html" %}
{% block title %}Generate{% endblock %}
{% block content %}
<div x-data="generator()" x-init="loadPosts()">
    <h1>Generate a post</h1>
    <p class="muted">
        GhostPro pulls from your Content Inbox first, then your topics — and writes
        in your voice. Generated posts start as drafts.
    </p>

    <div class="card">
        <button class="button" @click="generate()" x-text="generating ? 'Generating...' : 'Generate a post'"></button>
        <a class="button secondary" href="{{ url_for('routes.inbox') }}">Add to inbox first</a>
        <div x-show="error" class="flash error" style="margin-top: 14px;" x-text="error"></div>

        <template x-if="latest">
            <div style="margin-top: 18px; border-top: 1px solid #eee; padding-top: 14px;">
                <p class="muted" style="font-size: 13px;">
                    New draft · source: <span x-text="latest.source_type"></span> ·
                    <span x-text="latest.char_count"></span> / 3000 chars
                </p>
                <div style="white-space: pre-wrap;" x-text="latest.content"></div>
            </div>
        </template>
    </div>

    <div class="card">
        <h2>Recent drafts</h2>
        <template x-if="posts.length === 0">
            <p class="muted">No posts yet — generate your first one above.</p>
        </template>
        <template x-for="p in posts" :key="p.id">
            <div style="border-bottom: 1px solid #eee; padding: 12px 0;">
                <div style="display: flex; gap: 8px; align-items: center;">
                    <span style="font-size: 12px; padding: 2px 8px; border-radius: 10px; background: #efe;"
                          x-text="p.status"></span>
                    <span class="muted" style="font-size: 12px;" x-text="p.source_type"></span>
                    <span class="muted" style="font-size: 12px;" x-text="p.char_count + ' chars'"></span>
                </div>
                <div style="white-space: pre-wrap; margin-top: 6px;"
                     x-text="p.content.length > 280 ? p.content.slice(0, 280) + '…' : p.content"></div>
            </div>
        </template>
    </div>
</div>

<script>
function generator() {
    return {
        posts: [],
        latest: null,
        generating: false,
        error: '',
        async loadPosts() {
            const res = await fetch('{{ url_for("routes.posts_list") }}');
            this.posts = await res.json();
        },
        async generate() {
            this.generating = true;
            this.error = '';
            try {
                const res = await fetch('{{ url_for("routes.posts_generate") }}', { method: 'POST' });
                const data = await res.json();
                if (res.ok && data.status === 'success') {
                    this.latest = data.post;
                    await this.loadPosts();
                } else {
                    this.error = data.message || 'Could not generate a post.';
                }
            } catch (e) {
                this.error = 'Network error. Please try again.';
            } finally {
                this.generating = false;
            }
        }
    };
}
</script>
{% endblock %}
